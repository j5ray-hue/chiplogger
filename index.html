<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chip Logger</title>
    <script>
      (function () {
        const currentPath = window.location.pathname || "/";
        const currentSearch = window.location.search || "";
        const currentHash = window.location.hash || "";
        if (currentPath === "/" || currentPath === "/index.html") {
          window.location.replace(`/poker.html${currentSearch}${currentHash}`);
          return;
        }
        const params = new URLSearchParams(currentSearch);
        if (!params.has("path")) {
          params.set("path", currentPath);
        }
        window.location.replace(`/poker.html?${params.toString()}${currentHash}`);
      }());
    </script>
  </head>
  <body>
    <p>Redirecting to <a href="/poker.html">Poker Tracker</a>...</p>
  </body>
</html>
