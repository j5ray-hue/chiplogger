<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chip Logger</title>
    <script>
      (function () {
        const currentPath = window.location.pathname || "/";
        if (currentPath === "/" || currentPath === "/index.html") {
          window.location.replace("/poker.html");
          return;
        }
        window.location.replace(`/poker.html?path=${encodeURIComponent(currentPath)}`);
      }());
    </script>
  </head>
  <body>
    <p>Redirecting to <a href="/poker.html">Poker Tracker</a>...</p>
  </body>
</html>
